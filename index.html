<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./app.js" defer></script>
    <link rel="stylesheet" href="./styles.css">
    <title>Periodic Table</title>
</head>
<body>
    <header class="header">Periodic Table</header>
    <main>
        <section class="periodic-table-section">
            <div class="periodic-table">
                 <div class="periodictablecard">
                    <span class="symbol"></span>
                    <span class="name"></span>
                    <span class="electrons"></span>
                    <span class="protons"></span>
                    <span class="neutrons"></span>
                 </div>
            </div>
        </section>
        <section class="atom-section">
            <div class="element-info"></div>
            <div class="element-demo"></div>
        </section>
    </main>
</body>
</html>
